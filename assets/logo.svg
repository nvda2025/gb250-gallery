<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9e27d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Circle Frame -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#gold-grad)" stroke-width="4" />
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#gold-grad)" stroke-width="1" />
  
  <!-- Text Path -->
  <path id="curve" d="M 40,100 A 60,60 0 0,1 160,100" fill="none" />
  <text fill="#d4af37" font-family="'Cinzel', serif" font-size="18" font-weight="bold">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">GB250 CLUBMAN</textPath>
  </text>
  
  <!-- Wing/Speed Lines -->
  <path d="M 50,110 L 150,110 M 60,120 L 140,120 M 80,130 L 120,130" stroke="url(#gold-grad)" stroke-width="2" />
  
  <!-- Est. Year -->
  <text x="100" y="150" fill="#d4af37" font-family="serif" font-size="10" text-anchor="middle">EST. 1983</text>
</svg>
